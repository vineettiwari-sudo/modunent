<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="8" fill="url(#grad)"/>
  <!-- Top row: 2 small UI blocks -->
  <rect x="7" y="7" width="8" height="5" rx="1.5" fill="white" opacity="0.95"/>
  <rect x="17" y="7" width="8" height="5" rx="1.5" fill="white" opacity="0.5"/>
  <!-- Middle: wide block -->
  <rect x="7" y="14.5" width="18" height="4" rx="1.5" fill="white" opacity="0.75"/>
  <!-- Bottom row: 3 small blocks -->
  <rect x="7" y="21" width="5" height="4" rx="1.5" fill="white" opacity="0.5"/>
  <rect x="13.5" y="21" width="5" height="4" rx="1.5" fill="white" opacity="0.75"/>
  <rect x="20" y="21" width="5" height="4" rx="1.5" fill="white" opacity="0.5"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4060f0"/>
      <stop offset="100%" stop-color="#2a42cc"/>
    </linearGradient>
  </defs>
</svg>
