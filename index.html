<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modunent – UI Library</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
<!-- ================= HOME ================= -->
<div id="home-page">

  <nav class="hp-nav">
    <a href="#" class="logo">Modu<span>nent</span></a>
    <button class="btn-primary" onclick="gp('lib')">
      Explore Library
    </button>
  </nav>

 <section class="hero" style="position:relative; padding:120px 24px;">

  <div style="
    position:absolute;
    width:600px;
    height:600px;
    background:radial-gradient(circle, var(--acg), transparent 70%);
    top:-200px;
    left:50%;
    transform:translateX(-50%);
    filter:blur(80px);
    opacity:.6;
    pointer-events:none;
  "></div>

  <h1 style="
    font-size:56px;
    font-weight:800;
    margin-bottom:20px;
    letter-spacing:-1px;
  ">
    Free E-Commerce UI
    <span style="color:var(--ac);">Library</span>
  </h1>

  <p style="
    color:var(--mt2);
    max-width:680px;
    margin:0 auto 36px;
    font-size:18px;
  ">
    Production-ready components built for Shopify,
    SaaS and D2C brands.
    Clean. Minimal. Conversion-focused.
  </p>

  <div style="display:flex; gap:18px; justify-content:center;">

    <button class="btn-primary" onclick="gp('lib')">
      Explore All Elements
    </button>

    <button
      style="
        background:transparent;
        border:1px solid var(--bd2);
        color:var(--tx);
        padding:8px 18px;
        border-radius:8px;
        font-size:.85rem;
        cursor:pointer;
        font-weight:600;
      "
      onclick="alert('Documentation coming soon')"
    >
      View Docs
    </button>

  </div>

</section>

</div>


<!-- ================= LIBRARY ================= -->
<div id="library-page">

  <div class="lib-tabs">
    <button class="lib-tab-btn active" data-tab="all">All</button>
    <button class="lib-tab-btn" data-tab="product-cards">Product Cards</button>
    <button class="lib-tab-btn" data-tab="buttons">Buttons</button>
    <button class="lib-tab-btn" data-tab="qty">Quantity</button>
    <button class="lib-tab-btn" data-tab="tags">Tags</button>
    <button class="lib-tab-btn" data-tab="discount">Discount</button>
    <button class="lib-tab-btn" data-tab="badges">Badges</button>
    <button class="lib-tab-btn" data-tab="navigation">Navigation</button>
    <button class="lib-tab-btn" data-tab="announcements">Announcements</button>
    <button class="lib-tab-btn" data-tab="filters">Filters</button>
    <button class="lib-tab-btn" data-tab="forms">Forms</button>
  </div>

  <div class="lib-content">

    <div class="comp-sec active" id="sec-all">
      <h2>All Components</h2>
    </div>

    <div class="comp-sec" id="sec-product-cards">
      <h2>Product Cards</h2>
    </div>

    <div class="comp-sec" id="sec-buttons">
      <h2>Buttons</h2>
    </div>

    <div class="comp-sec" id="sec-qty">
      <h2>Quantity</h2>
    </div>

    <div class="comp-sec" id="sec-tags">
      <h2>Tags</h2>
    </div>

    <div class="comp-sec" id="sec-discount">
      <h2>Discount</h2>
    </div>

    <div class="comp-sec" id="sec-badges">
      <h2>Badges</h2>
    </div>

    <div class="comp-sec" id="sec-navigation">
      <h2>Navigation</h2>
    </div>

    <div class="comp-sec" id="sec-announcements">
      <h2>Announcements</h2>
    </div>

    <div class="comp-sec" id="sec-filters">
      <h2>Filters</h2>
    </div>

    <div class="comp-sec" id="sec-forms">
      <h2>Forms</h2>
    </div>

  </div>

</div>
<script src="assets/js/script.js"></script>

</body>
</html>
