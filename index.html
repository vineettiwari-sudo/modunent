<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modunent – Free E-Commerce UI Library</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

<!-- ================= HOME PAGE ================= -->
<div id="home-page">

  <nav class="hp-nav">
    <div class="logo">Modu<span>nent</span></div>
    <button class="btn-primary" onclick="gp('lib')">
      Explore Library
    </button>
  </nav>

  <section class="hero">

    <div class="badge">
      ● FREE E-COMMERCE UI LIBRARY
    </div>

    <h1 class="hero-title">
      Build e-commerce <br>
      <span>interfaces faster</span>
    </h1>

    <p class="hero-sub">
      57+ production-ready components. Accessible, animated,
      and built for real e-commerce products — free forever.
    </p>

    <div class="hero-search">
      <input
        id="hero-search"
        type="text"
        placeholder="Search components, buttons, cards..."
      >
      <button onclick="heroSearch()">Search</button>
    </div>

  </section>

  <section class="preview-grid">
    <div class="preview-card"></div>
    <div class="preview-card"></div>
    <div class="preview-card"></div>
    <div class="preview-card"></div>
    <div class="preview-card"></div>
    <div class="preview-card"></div>
  </section>

</div>


<!-- ================= LIBRARY PAGE ================= -->
<div id="library-page">

  <div class="lib-header">
    <div class="logo" onclick="gp('home')" style="cursor:pointer">
      ← Modu<span>nent</span>
    </div>
    <div class="lib-title">UI ELEMENTS LIBRARY</div>
  </div>

  <div class="lib-tabs">
    <button class="lib-tab-btn active" data-tab="all">All</button>
    <button class="lib-tab-btn" data-tab="product-cards">Product Cards</button>
    <button class="lib-tab-btn" data-tab="buttons">Buttons</button>
    <button class="lib-tab-btn" data-tab="qty">Quantity Selectors</button>
    <button class="lib-tab-btn" data-tab="tags">Tags</button>
    <button class="lib-tab-btn" data-tab="discount">Discount Pills</button>
    <button class="lib-tab-btn" data-tab="badges">Badges</button>
    <button class="lib-tab-btn" data-tab="navigation">Navigation</button>
    <button class="lib-tab-btn" data-tab="announcements">Announcements</button>
    <button class="lib-tab-btn" data-tab="filters">Filters & Sorting</button>
    <button class="lib-tab-btn" data-tab="forms">Forms</button>
  </div>

  <div class="lib-content">

    <div class="comp-sec active" id="sec-all"></div>
    <div class="comp-sec" id="sec-product-cards"></div>
    <div class="comp-sec" id="sec-buttons"></div>
    <div class="comp-sec" id="sec-qty"></div>
    <div class="comp-sec" id="sec-tags"></div>
    <div class="comp-sec" id="sec-discount"></div>
    <div class="comp-sec" id="sec-badges"></div>
    <div class="comp-sec" id="sec-navigation"></div>
    <div class="comp-sec" id="sec-announcements"></div>
    <div class="comp-sec" id="sec-filters"></div>
    <div class="comp-sec" id="sec-forms"></div>

  </div>

</div>

<script src="assets/js/script.js"></script>

</body>
</html>
